<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Prompt Gallery</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }body {
  background: #0f0f0f;
  color: white;
  padding: 20px;
}

h1 {
  text-align: center;
  margin-bottom: 25px;
  font-size: 32px;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.card {
  background: #1a1a1a;
  border-radius: 20px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.3s ease;
  border: 1px solid #2b2b2b;
}

.card:hover {
  transform: scale(1.03);
}

.card img {
  width: 100%;
  height: 320px;
  object-fit: cover;
  display: block;
}

.card h3 {
  padding: 15px;
  text-align: center;
  font-size: 18px;
}

.popup {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  display: none;
  justify-content: center;
  align-items: center;
  padding: 20px;
  z-index: 1000;
}

.popup-content {
  background: #1d1d1d;
  max-width: 700px;
  width: 100%;
  border-radius: 20px;
  padding: 25px;
  position: relative;
  animation: pop 0.25s ease;
}

@keyframes pop {
  from {
    transform: scale(0.8);
    opacity: 0;
  }
  to {
    transform: scale(1);
    opacity: 1;
  }
}

.close {
  position: absolute;
  right: 18px;
  top: 12px;
  font-size: 28px;
  cursor: pointer;
}

.popup img {
  width: 100%;
  border-radius: 14px;
  margin-bottom: 18px;
}

.prompt-box {
  background: #111;
  border: 1px solid #333;
  padding: 16px;
  border-radius: 12px;
  line-height: 1.6;
  color: #dcdcdc;
  white-space: pre-wrap;
  margin-bottom: 18px;
}

.copy-btn {
  background: white;
  color: black;
  border: none;
  padding: 12px 18px;
  border-radius: 10px;
  font-size: 15px;
  cursor: pointer;
  font-weight: bold;
}

.copy-btn:hover {
  opacity: 0.9;
}

  </style>
</head>
<body>  <h1>✨ My AI Prompt Gallery</h1>  <div class="gallery"><div class="card" onclick="openPopup(0)">
  <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?q=80&w=1200" alt="Photo">
  <h3>Cinematic Portrait</h3>
</div>

<div class="card" onclick="openPopup(1)">
  <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=1200" alt="Photo">
  <h3>Soft Aesthetic</h3>
</div>

<div class="card" onclick="openPopup(2)">
  <img src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?q=80&w=1200" alt="Photo">
  <h3>Dark Moody Style</h3>
</div>

  </div>  <div class="popup" id="popup">
    <div class="popup-content">
      <span class="close" onclick="closePopup()">&times;</span><img id="popupImage" src="" alt="Preview">

  <div class="prompt-box" id="promptText"></div>

  <button class="copy-btn" onclick="copyPrompt()">Copy Prompt</button>
</div>

  </div>  <script>
    const data = [
      {
        image: 'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?q=80&w=1200',
        prompt: `Create a cinematic ultra realistic portrait of a young man standing outdoors during golden hour lighting, shallow depth of field, dramatic shadows, realistic skin texture, 85mm lens look, detailed eyes, soft bokeh background, high contrast, 8k quality.`
      },
      {
        image: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=1200',
        prompt: `Create a dreamy soft aesthetic portrait with pastel colors, natural sunlight, realistic facial features, smooth skin texture, elegant pose, soft shadows, high detail, ultra realistic photography style.`
      },
      {
        image: 'https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?q=80&w=1200',
        prompt: `Create a dark moody cinematic portrait with dramatic lighting, sharp jawline, realistic skin details, black background, intense expression, volumetric lighting, ultra detailed, movie poster style.`
      }
    ];

    function openPopup(index) {
      document.getElementById('popup').style.display = 'flex';
      document.getElementById('popupImage').src = data[index].image;
      document.getElementById('promptText').innerText = data[index].prompt;
    }

    function closePopup() {
      document.getElementById('popup').style.display = 'none';
    }

    function copyPrompt() {
      const text = document.getElementById('promptText').innerText;
      navigator.clipboard.writeText(text);
      alert('Prompt copied!');
    }

    window.onclick = function(e) {
      const popup = document.getElementById('popup');
      if (e.target === popup) {
        closePopup();
      }
    }
  </script></body>
</html>
